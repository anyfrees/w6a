<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>W6A.COM | 您的专属空间</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

    <style>
        :root {
            --bg-color: #050608;
            --text-main: #ffffff;
            --neon-cyan: #1de9b6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: crosshair;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            font-family: 'Space Grotesk', sans-serif;
            overflow: hidden; /* 防止移动端滑动导致页面滚动 */
            color: var(--text-main);
            touch-action: none; /* 禁用浏览器默认的触摸动作 */
        }

        #webgl-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        .ui-layer {
            position: absolute;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px;
            pointer-events: none;
        }

        header {
            display: flex;
            justify-content: space-between;
            font-size: 1rem;
            letter-spacing: 0.2em;
            color: rgba(255, 255, 255, 0.5);
            width: 100%;
        }

        .domain-title {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.5rem;
            letter-spacing: 0.5em;
            font-weight: 300;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(29, 233, 182, 0.5);
            white-space: nowrap;
        }

        .instruction {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 0.1em;
            animation: pulseText 2s infinite alternate;
            white-space: nowrap;
        }

        @keyframes pulseText {
            0% { opacity: 0.3; }
            100% { opacity: 0.8; }
        }

        #error-msg {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid rgba(255, 0, 0, 0.3);
            padding: 30px;
            text-align: center;
            z-index: 100;
            backdrop-filter: blur(10px);
            border-radius: 10px;
            width: 90%;
            max-width: 400px;
        }

        /* 移动端响应式适配 */
        @media (max-width: 768px) {
            .ui-layer {
                padding: 25px 20px;
            }
            
            header {
                flex-direction: column;
                align-items: center;
                gap: 8px;
                font-size: 0.8rem;
                letter-spacing: 0.1em;
            }

            .domain-title {
                font-size: 1.1rem;
                bottom: 70px;
                letter-spacing: 0.3em;
            }

            .instruction {
                font-size: 0.6rem;
                bottom: 30px;
            }
        }
    </style>
</head>
<body>

    <div id="error-msg">
        <h3 style="color: #ff4d4d; margin-bottom: 10px;">⚠️ 无法读取图像像素</h3>
        <p style="font-size: 0.9rem; color: #ccc;">请使用本地服务器运行此文件。</p>
    </div>

    <canvas id="webgl-canvas"></canvas>

    <div class="ui-layer">
        <header>
            <div>欢迎您</div>
            <div>联系：i@svip.email</div>
        </header>
        <div class="domain-title">域名正在出售</div>
        <div class="instruction">W6A.COM 版权所有</div>
    </div>

    <script>
        const canvas = document.getElementById('webgl-canvas');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050608, 0.001);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
        
        // 核心优化：动态计算相机距离。如果是手机（窄屏），把相机往后拉，确保标志能完整显示
        function updateCameraZ() {
            return window.innerWidth < 768 ? 1300 : 800; 
        }
        camera.position.z = updateCameraZ();

        const renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        // 限制移动端像素比，避免低端手机卡顿
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        let particleSystem;
        let originalPositions = [];
        let particlesData = [];

        const image = new Image();
        image.src = 'image_16.png'; 
        
        image.onload = () => {
            initParticlesFromImage(image);
        };

        image.onerror = () => {
            document.getElementById('error-msg').style.display = 'block';
        }

        function initParticlesFromImage(img) {
            const tempCanvas = document.createElement('canvas');
            const ctx = tempCanvas.getContext('2d');
            
            const width = img.width;
            const height = img.height;
            tempCanvas.width = width;
            tempCanvas.height = height;
            
            ctx.drawImage(img, 0, 0, width, height);
            
            let imageData;
            try {
                imageData = ctx.getImageData(0, 0, width, height).data;
            } catch (e) {
                document.getElementById('error-msg').style.display = 'block';
                return;
            }

            const geometry = new THREE.BufferGeometry();
            const positions = [];
            const colors = [];
            
            // 为了提升手机端性能，可以稍微调大 step 值（粒子数量变少）。这里保持 5 平衡效果与性能。
            const step = 5; 
            
            for (let y = 0; y < height; y += step) {
                for (let x = 0; x < width; x += step) {
                    const index = (y * width + x) * 4;
                    const r = imageData[index];
                    const g = imageData[index + 1];
                    const b = imageData[index + 2];
                    const a = imageData[index + 3];

                    const brightness = (r + g + b) / 3;
                    if (a > 50 && brightness > 30) {
                        
                        const pX = (x - width / 2) * 0.8;
                        const pY = -(y - height / 2) * 0.8; 
                        const pZ = (brightness / 255) * 60 - 30; 

                        positions.push(pX, pY, pZ);
                        originalPositions.push({ x: pX, y: pY, z: pZ });
                        
                        particlesData.push({
                            phase: Math.random() * Math.PI * 2,
                            speed: 0.02 + Math.random() * 0.02
                        });

                        colors.push(r / 255, g / 255, b / 255);
                    }
                }
            }

            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 2.5,
                vertexColors: true,
                blending: THREE.AdditiveBlending,
                transparent: true,
                opacity: 0.9,
                depthWrite: false
            });

            particleSystem = new THREE.Points(geometry, material);
            scene.add(particleSystem);

            animate();
        }

        // --- 交互逻辑统一处理 (兼容鼠标和触摸) ---
        const mouse = new THREE.Vector2(-9999, -9999);
        let targetX = 0;
        let targetY = 0;

        function updateInteractPosition(clientX, clientY) {
            mouse.x = (clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(clientY / window.innerHeight) * 2 + 1;
            
            targetX = (clientX - window.innerWidth / 2) * 0.2;
            targetY = (clientY - window.innerHeight / 2) * 0.2;
        }

        // 桌面端鼠标事件
        document.addEventListener('mousemove', (event) => {
            updateInteractPosition(event.clientX, event.clientY);
        });

        // 移动端触摸事件
        document.addEventListener('touchmove', (event) => {
            if(event.touches.length > 0) {
                updateInteractPosition(event.touches[0].clientX, event.touches[0].clientY);
            }
        }, { passive: false }); // passive: false 确保可以阻止默认滚动

        // 触摸结束后让效果归位
        document.addEventListener('touchend', () => {
            mouse.x = -9999;
            mouse.y = -9999;
            targetX = 0;
            targetY = 0;
        });

        let time = 0;

        function animate() {
            requestAnimationFrame(animate);
            time += 0.01;

            if (particleSystem) {
                const positions = particleSystem.geometry.attributes.position.array;
                
                for (let i = 0; i < originalPositions.length; i++) {
                    const i3 = i * 3;
                    const orig = originalPositions[i];
                    const data = particlesData[i];
                    
                    data.phase += data.speed;
                    let currentX = orig.x + Math.sin(data.phase) * 3;
                    let currentY = orig.y + Math.cos(data.phase) * 3;
                    let currentZ = orig.z + Math.sin(time * 2 + orig.x * 0.01) * 15;

                    const mouseIn3D_X = mouse.x * (window.innerWidth / 2.5);
                    const mouseIn3D_Y = mouse.y * (window.innerHeight / 2.5);
                    
                    const dx = mouseIn3D_X - currentX;
                    const dy = mouseIn3D_Y - currentY;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    const interactRadius = 150; 
                    if (distance < interactRadius) {
                        const force = (interactRadius - distance) / interactRadius;
                        currentX -= (dx / distance) * force * 50;
                        currentY -= (dy / distance) * force * 50;
                        currentZ += force * 100;
                    }

                    positions[i3] += (currentX - positions[i3]) * 0.1;
                    positions[i3 + 1] += (currentY - positions[i3 + 1]) * 0.1;
                    positions[i3 + 2] += (currentZ - positions[i3 + 2]) * 0.1;
                }
                
                particleSystem.geometry.attributes.position.needsUpdate = true;
                
                camera.position.x += (targetX - camera.position.x) * 0.05;
                camera.position.y += (-targetY - camera.position.y) * 0.05;
                camera.lookAt(scene.position);
            }

            renderer.render(scene, camera);
        }

        // 窗口缩放适配
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            // 窗口缩放时，重新计算相机距离
            camera.position.z = updateCameraZ();
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
