<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>W6A.COM | 您的专属域名</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<style>
body{margin:0;overflow:hidden;background:#050608;font-family:'Space Grotesk';color:#fff;touch-action:none;}
canvas{position:fixed;top:0;left:0}
.ui{position:absolute;width:100%;height:100%;display:flex;flex-direction:column;justify-content:space-between;padding:40px;box-sizing:border-box;pointer-events:none}
.title{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);letter-spacing:0.4em;white-space:nowrap;text-align:center;}
@media (max-width: 768px) {
  .ui { padding: 20px; }
  .title { bottom: 60px; font-size: 14px; letter-spacing: 0.2em; }
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="ui">
<div>欢迎您！</div>
<div class="title">域名正在出售,请报价发送至：i@svip.email</div>
</div>

<script>
const canvas = document.getElementById('c');
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 3000);

const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio, 1.8));

function updateCamera() {
  const aspect = innerWidth / innerHeight;
  camera.aspect = aspect;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);

  const baseAspect = 1.2;
  if (aspect < baseAspect) {
    camera.position.z = 650 * (baseAspect / aspect);
  } else {
    camera.position.z = 650;
  }
}
updateCamera();

let particles, orig = [], data = [];

const img = new Image();
img.src = 'image_16.png';
img.onload = () => init(img);

function init(img){
  const cvs = document.createElement('canvas');
  const ctx = cvs.getContext('2d');
  cvs.width = img.width;
  cvs.height = img.height;
  ctx.drawImage(img, 0, 0);

  const d = ctx.getImageData(0,0,img.width,img.height).data;

  const geo = new THREE.BufferGeometry();
  const pos = [];
  const col = [];

  for(let y=0; y<img.height; y+=4){
    for(let x=0; x<img.width; x+=4){
      const i = (y*img.width + x) * 4;
      const r=d[i], g=d[i+1], b=d[i+2], a=d[i+3];
      if(a>100){
        const px=(x-img.width/2);
        const py=-(y-img.height/2);
        const pz=(r+g+b)/3/255*60-30;
        pos.push(px,py,pz);
        col.push(r/255,g/255,b/255);
        orig.push({x:px,y:py,z:pz});
        data.push({p:Math.random()*6, s:0.005+Math.random()*0.005});
      }
    }
  }

  geo.setAttribute('position', new THREE.Float32BufferAttribute(pos,3));
  geo.setAttribute('color', new THREE.Float32BufferAttribute(col,3));

  const mat = new THREE.PointsMaterial({
    size: 1.6,
    vertexColors: true,
    transparent: true,
    opacity: 0.85,
    depthWrite:false,
    blending: THREE.AdditiveBlending
  });

  const glowMat = new THREE.PointsMaterial({
    size: 3.5,
    vertexColors: true,
    transparent: true,
    opacity: 0.18,
    depthWrite:false,
    blending: THREE.AdditiveBlending
  });

  particles = new THREE.Points(geo, mat);
  const glowParticles = new THREE.Points(geo, glowMat);

  scene.add(glowParticles);
  scene.add(particles);
  animate();
}

let mouse = {x:-9999, y:-9999};
let smoothMouse = {x:-9999, y:-9999};


let currentRadius = 0;
let targetRadius = 0;


addEventListener('mousemove', e => {
  mouse.x = (e.clientX - innerWidth/2);
  mouse.y = (e.clientY - innerHeight/2);
  targetRadius = 12000; 
});
addEventListener('mouseleave', () => {
  targetRadius = 0; 
});


addEventListener('touchstart', e => {
  mouse.x = (e.touches[0].clientX - innerWidth/2);
  mouse.y = (e.touches[0].clientY - innerHeight/2);
  

  smoothMouse.x = mouse.x;
  smoothMouse.y = mouse.y;
  

  currentRadius = 15000;
  targetRadius = 15000;
}, {passive: true});

addEventListener('touchmove', e => {
  mouse.x = (e.touches[0].clientX - innerWidth/2);
  mouse.y = (e.touches[0].clientY - innerHeight/2);
}, {passive: true});

addEventListener('touchend', () => {
  targetRadius = 0; 
});

let t = 0;
function animate(){
  requestAnimationFrame(animate);
  t += 0.01;


  smoothMouse.x += (mouse.x - smoothMouse.x) * 0.08;
  smoothMouse.y += (mouse.y - smoothMouse.y) * 0.08;

  currentRadius += (targetRadius - currentRadius) * 0.08;

  if(particles){
    const arr = particles.geometry.attributes.position.array;
    const breath = (Math.sin(t)+1)/2;
    particles.material.opacity = 0.65 + breath*0.25;

    for(let i=0; i<orig.length; i++){
      const i3 = i*3;
      const o = orig[i];
      const d0 = data[i];

      d0.p += d0.s;


      let x = o.x + Math.sin(d0.p + t*0.5) * 2.0;
      let y = o.y + Math.cos(d0.p + t*0.5) * 2.0;
      

      let wave1 = Math.sin(t*1.5 + o.x*0.015 + o.y*0.01) * 8;
      let wave2 = Math.cos(t*0.8 + o.x*0.02) * 5;
      let z = o.z + wave1 + wave2;

      const dx = smoothMouse.x - x;
      const dy = -smoothMouse.y - y;
      const dist = dx*dx + dy*dy;


      if(currentRadius > 100 && dist < currentRadius){
        const f = (currentRadius - dist)/currentRadius;

        x -= dx * f * 1.5; 
        y -= dy * f * 1.5;
        z += f * 15; 
      }


      arr[i3]     += (x - arr[i3]) * 0.1;
      arr[i3 + 1] += (y - arr[i3 + 1]) * 0.1;
      arr[i3 + 2] += (z - arr[i3 + 2]) * 0.1;
    }

    particles.geometry.attributes.position.needsUpdate = true;
  }

  renderer.render(scene, camera);
}

addEventListener('resize', () => {
  updateCamera();
});
</script>
</body>
</html>
